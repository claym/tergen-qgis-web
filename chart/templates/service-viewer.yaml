apiVersion: v1
kind: Service
metadata:
  name: viewer
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "qgis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "qgis.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: viewer
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
