{{- if .Values.generator.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: project-generator-{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "qgis.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 1
  template:
    metadata:
      labels:
        {{- include "qgis.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: project-generator
    spec:
      restartPolicy: Never
      containers:
        - name: generator
          image: {{ .Values.image.generator }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - python
            - /scripts/generate_qgs.py
            - /srv/qgis/data
            - --output
            - {{ .Values.projectFile }}
          volumeMounts:
            - name: data
              mountPath: /srv/qgis
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            {{- toYaml .Values.resources.generator | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: qgis-data
        - name: scripts
          configMap:
            name: project-generator
            defaultMode: 0555
{{- end -}}
